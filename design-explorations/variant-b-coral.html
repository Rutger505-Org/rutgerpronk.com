<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<style>
  :root{
    --accent:#FF6B6B;
    --accent-soft:rgba(255,107,107,0.45);
    --bg:#0c0a14;
    --bg2:#070510;
    --text:#EDEDED;
    --text2:#9aa3b2;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(120% 120% at 85% 15%, var(--bg) 0%, var(--bg2) 70%);
    color:var(--text);overflow:hidden;
  }
  .wrap{position:relative;height:100vh;width:100vw;display:flex;flex-direction:column;justify-content:space-between;padding:48px 64px}
  /* faint dot grid */
  .wrap::before{content:"";position:absolute;inset:0;
    background-image:radial-gradient(rgba(255,255,255,.05) 1px, transparent 1px);
    background-size:34px 34px;mask:radial-gradient(120% 120% at 85% 15%, #000 30%, transparent 75%);}
  /* accent glow blob, top-right */
  .blob{position:absolute;top:-10%;right:-8%;width:55vh;height:55vh;border-radius:50%;
    background:var(--accent);opacity:.18;filter:blur(120px)}
  .topbar{display:flex;justify-content:space-between;align-items:center;position:relative;z-index:2;font-size:14px;color:var(--text2)}
  .topbar .brand{font-weight:700;color:var(--text);letter-spacing:.02em}
  .topbar nav{display:flex;gap:28px}
  .topbar nav span{position:relative}
  .topbar nav span:hover{color:var(--text)}

  .hero{position:relative;z-index:2;display:flex;flex-direction:column;align-items:flex-end;text-align:right;margin-top:auto;margin-bottom:auto}
  .eyebrow{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:.32em;text-transform:uppercase;
    font-size:15px;color:var(--accent);margin-bottom:22px}
  h1{font-size:84px;line-height:.98;font-weight:800;letter-spacing:-.02em;max-width:14ch}
  h1 .name{color:var(--accent);text-shadow:0 0 28px var(--accent-soft)}
  .sub{margin-top:26px;color:var(--text2);font-size:18px;max-width:46ch}

  .skills{display:flex;gap:14px;justify-content:flex-end;flex-wrap:wrap;margin-top:38px}
  .skills span{border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:8px 16px;font-size:13px;color:var(--text2)}
  .skills span.hot{border-color:var(--accent);color:var(--accent)}

  .footer{display:flex;justify-content:space-between;align-items:flex-end;position:relative;z-index:2}
  .scroll{display:flex;align-items:center;gap:10px;color:var(--text2);font-size:13px;letter-spacing:.1em}
  .scroll .dot{width:22px;height:36px;border:1px solid rgba(255,255,255,.2);border-radius:12px;position:relative}
  .scroll .dot::after{content:"";position:absolute;left:50%;top:7px;width:4px;height:8px;border-radius:2px;background:var(--accent);transform:translateX(-50%)}
  .tag{font-family:ui-monospace,monospace;font-size:12px;color:var(--text2)}
  .tag b{color:var(--accent)}
</style></head>
<body><div class="wrap">
  <div class="blob"></div>
  <div class="topbar">
    <div class="brand">Rutger Pronk</div>
    <nav><span>About me</span><span>My work</span><span>Contact</span><span style="color:var(--accent)">EN</span></nav>
  </div>

  <div class="hero">
    <div class="eyebrow">&lt;/&gt; Software-dev</div>
    <h1>Hi, I'm <span class="name">Rutger</span> from the Netherlands</h1>
    <div class="sub">Software-development student building web things with Next.js, TypeScript & a self-hosted K8s pipeline.</div>
    <div class="skills">
      <span class="hot">TypeScript</span><span>Next.js</span><span>React</span><span>Tailwind</span><span>Kubernetes</span><span>Terraform</span>
    </div>
  </div>

  <div class="footer">
    <div class="tag">variant <b>B · Soft Coral</b></div>
    <div class="scroll"><span>SCROLL</span><div class="dot"></div></div>
  </div>
</div></body></html>
